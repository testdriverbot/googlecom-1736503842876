version: 4.1.35
steps:
  - prompt: Focus the browser window.
    commands:
      - command: focus-application
        name: Google Chrome
  - prompt: Assert that the "Google Search" button is present.
    commands:
      - command: assert
        expect: the "Google Search" button is present
  - prompt: >-
      Assert that clicking "Google Search" performs a search.  # Use the content
      of the file from the environment
    commands:
      - command: hover-text
        text: Google Search
        description: search button on the Google homepage
        action: click
      - command: assert
        expect: the search results page is displayed
